app:
  icon_path: btc-line.png
  enable_ticker_task: True
  enable_world_clock_service: True
  timezones:
    UTC:
      timezone: UTC
      flag: 🌐
    China:
      timezone: Asia/Shanghai
      flag: 🇨🇳
    London:
      timezone: Europe/London
      flag: 🇬🇧
    Chicago:
      timezone: America/Chicago
      flag: 🇺🇸
data:
  cache:
    cleanup_interval: 600 # 使用第三方包就不用了
    data_expiry: 86400 # 1天
    max_size: 2000 
  scheduler:
    ticker_update_interval: 3
  symbols:
  - BTC-USDT-SWAP
  - ETH-USDT-SWAP
  timeframes:
    1m:
      buffer_periods: 50
      cache_size: 400
      min_periods: 10
      update_interval: 50
      show_on_ui: false
    5m:
      buffer_periods: 50
      cache_size: 400
      min_periods: 20
      update_interval: 60
      show_on_ui: true
    1h:
      buffer_periods: 50
      cache_size: 400
      min_periods: 10
      update_interval: 120
      show_on_ui: true
    # 4h:
    #   buffer_periods: 50
    #   cache_size: 400
    #   min_periods: 10
    #   update_interval: 200
    #   show_on_ui: true
  trend_analyzer_fetch_periods: 30
  trend_min_confidence:
    5m: 0.5
    1h: 0.6
    4h: 0.65
  analysis_interval_sec: 10
  trend_models:
    breakout:
      volume_multiplier: 1.5
      breakout_threshold: 0.5
      confirmation_periods: 2
      min_periods: 20
      per_timeframe:
        5m:
          volume_multiplier: 1.5
          breakout_threshold: 0.5
          confirmation_periods: 2
    channel:
      wide_channel_threshold: 4.0
      narrow_channel_threshold: 1.5
      channel_consistency: 0.7
      slope_up_threshold: 0.1
      slope_down_threshold: -0.1
      min_periods: 20
      per_timeframe:
        5m:
          slope_up_threshold: 0.1
          slope_down_threshold: -0.1
          narrow_channel_threshold: 1.5
    consolidation:
      adx_threshold: 25
      price_range_threshold: 3.0
      ma_convergence_threshold: 2.0
      rsi_range: [30, 70]
      min_periods: 20
      per_timeframe:
        5m:
          adx_threshold: 25
          price_range_threshold: 3.0
          ma_convergence_threshold: 2.0
ui:
  display:
    current_bg_style: deep
    current_opacity: 0.8
    display_mode: auto  # auto, main, index
    display_index: 0    # 当display_mode为index时使用的显示器索引
  orders:
    enabled: true  # 是否启用订单状态显示
    show_pending_only: false  # 是否只显示未完成订单（false=显示所有订单）
    max_display_orders: 10  # 最多显示订单数量（增加到10个以包含更多成交订单）
    update_interval: 30  # 订单状态更新间隔（秒）
    show_profit_info: true  # 是否显示收益信息
    show_order_details: true  # 是否显示订单详细信息
  positions:
    enabled: true  # 是否启用仓位状态显示
    max_display_positions: 10  # 最多显示仓位数
    update_interval: 30  # 仓位状态更新间隔（秒）
    show_profit_info: true  # 是否显示收益信息
    show_position_details: true  # 是否显示仓位详细信息

# OKX API配置
exchange:
  okx:
    # API密钥配置（可选，如果不配置则只获取公开数据）
    api_key: ""  # OKX API Key
    secret: ""   # OKX Secret Key
    passphrase: ""  # OKX Passphrase
    sandbox: false  # 是否使用沙盒环境（测试网）
    # API权限说明：
    # - 读取：只查询订单和账户信息，不能交易
    # - 交易：可以下单和撤单
    # 建议使用只读权限的API密钥

alert_thresholds:
  # 5m 冲击（X3）百分比阈值（绝对值比较）
  impulse_pct_threshold: 0.7
  # 连续突破最少蜡烛数
  breakout_consecutive_min: 2
  # 连续突破累计变化百分比最小值
  breakout_change_pct_min: 1.0
  # 1m 实时区间百分比阈值
  realtime_range_pct_min: 0.8
  # 告警冷却时间（秒）
  cooldown_sec: 50
  # 告警标题前缀
  notification_title_prefix: "指标告警"
